server:
  udp_host: "0.0.0.0"       # IPv4 UDP listener bind address
  udp_port: 9999             # UDP port to listen on
  web_host: "0.0.0.0"       # Web server bind address
  web_port: 8080             # Web server port
  # multicast_groups:        # Optional: IPv4 multicast groups to join
  #   - "224.0.0.1"

  ipv6_enabled: true         # Start an IPv6 UDP listener alongside IPv4
  udp6_host: "::"            # IPv6 UDP listener bind address
  udp6_port: 9999            # IPv6 UDP port (may share the same port as IPv4)
  # multicast6_groups:       # Optional: IPv6 multicast groups to join
  #   - group: "ff02::1"     # Link-local all-nodes multicast
  #     interface: "eth0"    # Interface required for link-local groups

monitor:
  default_timeout: 60        # Seconds before a system is marked as timed out, default is 1 minute
  cleanup_after: 86400       # Seconds to remove a system entry entirely after last heartbeat, default is 24 hours
  refresh_interval: 2        # Seconds between UI auto-refresh
  grid_columns: 3            # Number of columns in the systems grid (1–6)

daemon:
  enabled: false                           # Set to true to run as a background daemon
  pid_file: "/tmp/heartbeat_monitor.pid"   # PID file location
  log_file: "/tmp/heartbeat_monitor.log"   # Log file (stdout/stderr redirected here)
  working_dir: "/"                         # Working directory after daemonizing

# Optional: per-system overrides. Systems not listed here use default_timeout.
systems:
  - name: "critical-service"
    timeout: 10
    description: "Critical production service"
  - name: "batch-processor"
    timeout: 120
    description: "Nightly batch processing job"
